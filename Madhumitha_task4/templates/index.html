<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER AI PASSWORD GENERATOR</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Matrix Background -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Header -->
        <div class="header">
            <h1>⚡ CYBER AI PASSWORD GENERATOR ⚡</h1>
            <p class="typing-text"></p>
        </div>

        <!-- Live Clock -->
        <div class="clock-box">
            <span id="clock"></span>
        </div>

        <!-- Terminal Box -->
        <div class="terminal-box">

            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>

                <span class="terminal-title">
                    root@cyber-security:~$
                </span>
            </div>

            <div class="terminal-body">

                <!-- Length -->
                <div class="input-group">
                    <label>Password Length</label>

                    <input type="range"
                           id="length"
                           min="6"
                           max="30"
                           value="12">

                    <span id="lengthValue">12</span>
                </div>

                <!-- Options -->
                <div class="options">

                    <label>
                        <input type="checkbox" id="uppercase" checked>
                        Include Uppercase
                    </label>

                    <label>
                        <input type="checkbox" id="numbers" checked>
                        Include Numbers
                    </label>

                    <label>
                        <input type="checkbox" id="symbols" checked>
                        Include Symbols
                    </label>

                </div>

                <!-- Generate Button -->
                <button id="generateBtn">
                    GENERATE SECURE PASSWORD
                </button>

                <!-- Output -->
                <div class="output-box">
                    <input type="text"
                           id="passwordOutput"
                           readonly
                           placeholder="Generated password appears here">

                    <button id="copyBtn">
                        COPY
                    </button>
                </div>

                <!-- Strength -->
                <div class="strength-container">
                    <h3>Password Strength:</h3>
                    <div id="strengthText">---</div>
                </div>

                <!-- AI Scanner -->
                <div class="scanner-box">
                    <h3>AI Security Scanner</h3>

                    <div class="scanner-line"></div>

                    <div class="scan-status">
                        System Ready...
                    </div>
                </div>

            </div>
        </div>

        <!-- History -->
        <div class="history-box">
            <h2>Recent Password Logs</h2>

            <ul id="historyList">

            </ul>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='matrix.js') }}"></script>

</body>

</html>
